# SolarMind default configuration
# Mirror of HouseholdProfile defaults — used in our prototype run.

household:
  solar_kwp: 4.0              # Solar PV peak rating
  battery_kwh: 8.0            # Battery usable capacity
  daily_consumption_kwh: 8.0  # UK average household consumption
  weather_factor: 0.85        # 0.4 cloudy / 0.85 mixed / 1.05 sunny
  timestep_minutes: 30        # Decision cadence
  days: 30                    # Episode length

training:
  total_timesteps: 150000     # Q9 appendix configuration
  seed: 42
  algorithm: ppo

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2

evaluation:
  deterministic: true
  metrics:
    - net_30day_benefit_pounds
    - export_revenue_pounds
    - self_consumption_rate_pct
    - total_import_kwh
